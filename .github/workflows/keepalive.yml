name: Simple Appwrite Keepalive

on:
  schedule:
    - cron: '0 0 */4 * *' # Runs automatically every 4 days
  workflow_dispatch: # Allows you to run it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Appwrite Project
        run: |
          echo "Pinging Appwrite Server API to keep project active..."
          
          # This makes a safe GET request to list your databases using your API Key
          # It does NOT create anything, so it won't hit your free tier limits.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.APPWRITE_ENDPOINT }}/databases" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -H "Content-Type: application/json")
            
          echo "Response status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Keepalive successful! Timer reset."
          else
            echo "Keepalive failed with HTTP status $HTTP_STATUS. Check your API key and endpoint."
            exit 1
          fi
